<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Circular background (Telegram crops to circle) -->
  <circle cx="256" cy="256" r="256" fill="#0a0b0e"/>

  <!-- Subtle radial glow behind shield, centered on shield visual mid -->
  <radialGradient id="glow" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#e8b86f" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#e8b86f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- Shield body — visually centered (shifted +28px to offset top-heavy mass) -->
  <path d="M112 136 L400 136 L400 300 Q400 392 256 428 Q112 392 112 300 Z"
        fill="rgba(232,184,111,0.09)"
        stroke="#e8b86f"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Inner inset (depth) -->
  <path d="M136 158 L376 158 L376 296 Q376 374 256 406 Q136 374 136 296 Z"
        fill="none"
        stroke="rgba(232,184,111,0.20)"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Price candle ticks (subtle, above bar) -->
  <line x1="204" y1="216" x2="204" y2="266"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="198" x2="256" y2="266"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>
  <line x1="308" y1="224" x2="308" y2="266"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>

  <!-- Stop bar — bold block mark, horizontally centered -->
  <line x1="160" y1="290" x2="352" y2="290"
        stroke="#e8b86f"
        stroke-width="22"
        stroke-linecap="round"/>
</svg>
