<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Circular background (Telegram crops to circle) -->
  <circle cx="256" cy="256" r="256" fill="#0a0b0e"/>

  <!-- Subtle radial glow behind shield -->
  <radialGradient id="glow" cx="50%" cy="52%" r="38%">
    <stop offset="0%" stop-color="#e8b86f" stop-opacity="0.13"/>
    <stop offset="100%" stop-color="#e8b86f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- Shield body -->
  <path d="M112 108 L400 108 L400 272 Q400 364 256 400 Q112 364 112 272 Z"
        fill="rgba(232,184,111,0.09)"
        stroke="#e8b86f"
        stroke-width="10"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Inner inset (depth) -->
  <path d="M136 130 L376 130 L376 268 Q376 346 256 378 Q136 346 136 268 Z"
        fill="none"
        stroke="rgba(232,184,111,0.20)"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Price candle ticks (subtle, above bar) -->
  <line x1="204" y1="188" x2="204" y2="238"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="170" x2="256" y2="238"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>
  <line x1="308" y1="196" x2="308" y2="238"
        stroke="rgba(232,184,111,0.42)" stroke-width="8" stroke-linecap="round"/>

  <!-- Stop bar — the bold block mark -->
  <line x1="160" y1="262" x2="352" y2="262"
        stroke="#e8b86f"
        stroke-width="22"
        stroke-linecap="round"/>
</svg>
