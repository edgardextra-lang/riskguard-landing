<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark canvas, rounded corners — matches site --bg-2 -->
  <rect width="32" height="32" rx="5" fill="#0c1015"/>
  <g fill="#a3f7bf">
    <!-- Top-left chunky module with internal square notch (the "P" half) -->
    <path fill-rule="evenodd" d="M6 7H14V14H6V7ZM9 9H11V11H9V9Z"/>
    <!-- Top-right chunky F-shape (mirror partner) -->
    <path d="M17 7H26V9H20V14H17V7Z"/>
    <!-- Middle horizontal connector -->
    <rect x="6" y="14" width="20" height="2"/>
    <!-- Two vertical legs descending below -->
    <rect x="10" y="16" width="3" height="9"/>
    <rect x="20" y="16" width="3" height="9"/>
  </g>
</svg>
